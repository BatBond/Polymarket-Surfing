# render.yaml — Render Blueprint for one-click deployment
# ---------------------------------------------------------------------------
# Deploy this app to Render by going to:
#   https://render.com/registries?type=blueprint
#   New → Blueprint → select your repo (must contain this file)
#
# Render runs Node on standard EC2 instances with normal DNS resolution,
# which fixes the "ENOTFOUND for api.kalshi.com" issue on Vercel.
# ---------------------------------------------------------------------------

services:
  - type: web
    name: kalshi-ai-brain
    runtime: node
    plan: free
    region: oregon  # US West — closest Render region to Kalshi's US infrastructure
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: KALSHI_KEY_ID
        sync: false  # set this in Render dashboard after deploy
      - key: KALSHI_PRIVATE_KEY_PEM
        sync: false  # set this in Render dashboard after deploy
